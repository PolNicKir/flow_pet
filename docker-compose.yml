services:
  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: /api

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql://flow:flow@postgres:5432/flow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: flow
      S3_ACCESS_KEY: flowadmin
      S3_SECRET_KEY: flowadmin123
    command: sh -c "npx prisma db push && npm run start:prod"

  worker:
    build:
      context: ./backend
    depends_on:
      - backend
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql://flow:flow@postgres:5432/flow
      REDIS_URL: redis://redis:6379
    command: npm run worker

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: flow
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: flow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: flowadmin
      MINIO_ROOT_PASSWORD: flowadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"

volumes:
  postgres_data:
  minio_data:

